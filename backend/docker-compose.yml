services:
  postgres:
    image: postgres:16-alpine
    container_name: invora_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: invora_postgres_data
